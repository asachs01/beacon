name: Beacon
version: "1.0.0"
slug: beacon
description: "Family command center for wall-mounted displays"
url: "https://github.com/asachs/beacon"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 3000
panel_icon: mdi:calendar-clock
panel_title: Beacon
homeassistant_api: true
auth_api: true
options:
  weather_entity: "weather.home"
schema:
  weather_entity: str
