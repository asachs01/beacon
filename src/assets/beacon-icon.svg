<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Base (trapezoid) -->
  <path d="M18 56 L46 56 L42 44 L22 44 Z" fill="#f8fafc"/>

  <!-- Tower body (trapezoid) -->
  <path d="M22 44 L42 44 L38 16 L26 16 Z" fill="#f8fafc"/>

  <!-- Lantern room (rectangle) -->
  <rect x="24" y="10" width="16" height="6" rx="1" fill="#f8fafc"/>

  <!-- Glow arc 1 — inner, 100% opacity -->
  <path d="M20 13 A14 14 0 0 1 44 13"
        stroke="#f59e0b" stroke-width="2.5"
        stroke-linecap="round" fill="none"
        opacity="1"/>

  <!-- Glow arc 2 — middle, 60% opacity -->
  <path d="M14 13 A20 20 0 0 1 50 13"
        stroke="#f59e0b" stroke-width="2"
        stroke-linecap="round" fill="none"
        opacity="0.6"/>

  <!-- Glow arc 3 — outer, 30% opacity -->
  <path d="M8 13 A26 26 0 0 1 56 13"
        stroke="#f59e0b" stroke-width="2"
        stroke-linecap="round" fill="none"
        opacity="0.3"/>
</svg>
