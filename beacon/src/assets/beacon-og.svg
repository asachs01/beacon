<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Gold bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#f59e0b"/>

  <!-- Icon: 64x80 base, scaled 4.5x = 288x360, centered at x=270, y=135 -->
  <g transform="translate(270, 135) scale(4.5)">
    <path d="M12 76 L52 76 L46 64 L18 64 Z" fill="#f59e0b"/>
    <path d="M18 64 L46 64 L39 24 L25 24 Z" fill="#eef2f7"/>
    <rect x="24" y="18" width="16" height="8" rx="1" fill="#f59e0b"/>
    <rect x="27" y="20" width="10" height="5" rx="0.5" fill="#1e2d4a"/>
    <path d="M19.5 20 A13 13 0 0 1 44.5 20"
          stroke="#f59e0b" stroke-width="4"
          stroke-linecap="round" fill="none"/>
    <path d="M13 20 A20 20 0 0 1 51 20"
          stroke="#b8860b" stroke-width="3.5"
          stroke-linecap="round" fill="none"/>
    <path d="M6.5 20 A27 27 0 0 1 57.5 20"
          stroke="#7a5c0a" stroke-width="3"
          stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="345"
        font-family="'Plus Jakarta Sans', system-ui, sans-serif"
        font-size="110"
        font-weight="600"
        letter-spacing="-0.02em"
        fill="#f8fafc">Beacon</text>

  <!-- Tagline -->
  <text x="600" y="430"
        font-family="'Inter', system-ui, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#94a3b8"
        text-anchor="middle">Your family's daily signal</text>
</svg>
