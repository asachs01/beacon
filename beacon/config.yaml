name: Beacon
version: "1.20.1"
slug: beacon
description: "Family command center for wall-mounted displays"
url: "https://github.com/asachs01/beacon"
arch:
  - amd64
  - aarch64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 3000
panel_icon: mdi:calendar-clock
panel_title: Beacon
homeassistant_api: true
auth_api: true
options:
  family_name: "My Family"
  ha_token: ""
  theme: "skylight"
  auto_dark_mode: true
  weather_entity: "weather.home"
  photo_directory: "/media/beacon/photos"
  photo_interval: 30
  screen_saver_timeout: 5
schema:
  family_name: str
  ha_token: password
  theme: str
  auto_dark_mode: bool
  weather_entity: str
  photo_directory: str
  photo_interval: int
  screen_saver_timeout: int
